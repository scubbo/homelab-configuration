# EXAMPLE ONLY — this placeholder file is intentionally committed (like a
# `.env.example`) to document the shape of the Secret that templates/cronjob.yaml
# expects. It contains no real values. Do NOT paste real secrets into this file:
# the real Secret is created manually and lives only in the cluster, never in git
# (the chart's .gitignore tracks this example but blocks a real secret.yaml /
# rclone.conf).
#
# Preferred: create it imperatively (see README.md for how to obtain rclone.conf).
# Generate the restic password FIRST and save it to your password manager — if you
# only ever store it inside the cluster, a lost cluster means unrecoverable backups:
#
#   RESTIC_PW="$(openssl rand -base64 32)"; echo "$RESTIC_PW"   # save this
#   kubectl create namespace dropbox-backup
#   kubectl create secret generic dropbox-backup-secrets \
#     --namespace dropbox-backup \
#     --from-file=rclone.conf=/tmp/rclone.conf \
#     --from-literal=restic-password="$RESTIC_PW"
#
apiVersion: v1
kind: Secret
metadata:
  name: dropbox-backup-secrets
  namespace: dropbox-backup
type: Opaque
stringData:
  # A long random passphrase. LOSE THIS AND THE BACKUPS ARE UNRECOVERABLE —
  # store a copy in your password manager.
  restic-password: "REPLACE_ME_with_a_long_random_passphrase"
  # The full contents of an rclone config file containing a Dropbox remote named
  # `dropbox`. Generate the token with `rclone authorize dropbox` (see README.md).
  rclone.conf: |
    [dropbox]
    type = dropbox
    token = {"access_token":"REPLACE_ME","token_type":"bearer","refresh_token":"REPLACE_ME","expiry":"REPLACE_ME"}

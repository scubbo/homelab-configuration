services:
  # Inference server. Exposes the native + OpenAI-compatible API on :11434.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-32768}
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-1}
      - OLLAMA_KV_CACHE_TYPE=${OLLAMA_KV_CACHE_TYPE:-q8_0}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 30

  # Declarative model provisioning: pulls everything in models.txt and builds any
  # modelfiles/*.Modelfile, then exits. Re-run any time with `docker compose up model-loader`.
  model-loader:
    image: ollama/ollama:latest
    container_name: ollama-model-loader
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./models.txt:/models.txt:ro
      - ./modelfiles:/modelfiles:ro
      - ./bootstrap/pull-models.sh:/pull-models.sh:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "/pull-models.sh"]
    restart: "no"

  # ChatGPT-like web UI for daily use. http://localhost:3000
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=${WEBUI_AUTH:-true}

volumes:
  ollama-models:
  open-webui-data:

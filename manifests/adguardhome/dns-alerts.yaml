apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dns-health-alerts
  namespace: prometheus
  labels:
    release: prometheus
spec:
  groups:
    - name: dns-health
      interval: 30s
      rules:
        - alert: WANConnectivityDown
          expr: probe_success{probe_type="wan"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "WAN connectivity lost"
            description: "ICMP probe to {{ $labels.instance }} failing — OPNsense may have lost internet connectivity."
        - alert: LocalDNSDown
          expr: probe_success{probe_type="dns", instance=~"192\\.168\\..*"} == 0 and on() probe_success{probe_type="wan"} == 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Local DNS failing (WAN is up)"
            description: "DNS probe for {{ $labels.instance }} is failing but WAN is reachable — issue is with AdGuard/Unbound."
        - alert: DNSProbeHighLatency
          expr: probe_duration_seconds{probe_type="dns"} > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "DNS server {{ $labels.instance }} responding slowly"
            description: "DNS probe for {{ $labels.instance }} averaging {{ $value | humanizeDuration }} response time."
